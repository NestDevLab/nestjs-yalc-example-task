services:
  rabbitmq:
    image: rabbitmq:3.13-management-alpine
    container_name: nestjs-yalc-task-rabbitmq
    ports:
      - '5672:5672'
      - '15672:15672'
    environment:
      RABBITMQ_DEFAULT_USER: guest
      RABBITMQ_DEFAULT_PASS: guest
    healthcheck:
      test: ['CMD', 'rabbitmq-diagnostics', 'ping']
      interval: 5s
      timeout: 5s
      retries: 12
    volumes:
      - task-rabbitmq-data:/var/lib/rabbitmq

volumes:
  task-rabbitmq-data:
