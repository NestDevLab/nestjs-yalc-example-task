extensions:
  health_check:
    endpoint: 0.0.0.0:13133

receivers:
  otlp:
    protocols:
      grpc:
        endpoint: 0.0.0.0:4317
      http:
        endpoint: 0.0.0.0:4318

exporters:
  debug:
    verbosity: detailed
  file:
    path: /var/otel/telemetry.json

service:
  extensions: [health_check]
  pipelines:
    traces:
      receivers: [otlp]
      exporters: [debug, file]
    metrics:
      receivers: [otlp]
      exporters: [debug, file]
    logs:
      receivers: [otlp]
      exporters: [debug, file]
